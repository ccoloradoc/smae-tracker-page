<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <clipPath id="screen">
      <rect x="6" y="6" width="378" height="832" rx="38"/>
    </clipPath>
  </defs>

  <!-- Phone body -->
  <rect width="390" height="844" rx="44" fill="#1C1C1E"/>

  <g clip-path="url(#screen)">
    <!-- Screen background -->
    <rect x="6" y="6" width="378" height="832" fill="#F6F6F2"/>

    <!-- Status bar -->
    <rect x="6" y="6" width="378" height="52" fill="#6B8F71"/>
    <!-- Status bar items -->
    <rect x="22"  y="20" width="28" height="10" rx="3" fill="white" opacity=".6"/>
    <rect x="330" y="20" width="44" height="10" rx="3" fill="white" opacity=".6"/>
    <!-- Camera -->
    <circle cx="195" cy="26" r="5" fill="#1C1C1E"/>

    <!-- App bar -->
    <rect x="6" y="58" width="378" height="56" fill="white"/>
    <rect x="22"  y="76" width="64" height="16" rx="4" fill="#1A2E1C"/>
    <rect x="276" y="76" width="90" height="16" rx="4" fill="#E0E0E0"/>

    <!-- ── Summary card ── -->
    <rect x="22" y="126" width="346" height="118" rx="14" fill="white"/>
    <!-- Donut track -->
    <circle cx="86" cy="185" r="40" fill="none" stroke="#EBEBEB" stroke-width="13"/>
    <!-- Donut progress (75%) -->
    <circle cx="86" cy="185" r="40" fill="none" stroke="#6B8F71" stroke-width="13"
      stroke-dasharray="251.3" stroke-dashoffset="62.8"
      stroke-linecap="round" transform="rotate(-90 86 185)"/>
    <!-- % label -->
    <rect x="70" y="178" width="32" height="16" rx="4" fill="#E8F4EA"/>
    <!-- Right side -->
    <rect x="148" y="148" width="120" height="14" rx="4" fill="#1A2E1C"/>
    <rect x="148" y="170" width="148" height="12" rx="4" fill="#D0D0D0"/>
    <rect x="148" y="190" width="96" height="12" rx="4" fill="#D0D0D0"/>
    <rect x="148" y="210" width="72" height="12" rx="4" fill="#A4C3A2"/>

    <!-- ── Group cards ── -->
    <!-- Card 1: Verduras -->
    <rect x="22" y="256" width="346" height="76" rx="12" fill="white"/>
    <circle cx="52" cy="294" r="14" fill="#81A882"/>
    <rect x="76" y="282" width="90" height="13" rx="4" fill="#D0D0D0"/>
    <rect x="76" y="308" width="210" height="8" rx="4" fill="#EBEBEB"/>
    <rect x="76" y="308" width="147" height="8" rx="4" fill="#81A882"/>
    <rect x="308" y="284" width="48" height="18" rx="6" fill="#F0F0F0"/>

    <!-- Card 2: Frutas -->
    <rect x="22" y="340" width="346" height="76" rx="12" fill="white"/>
    <circle cx="52" cy="378" r="14" fill="#E8A87C"/>
    <rect x="76" y="366" width="76" height="13" rx="4" fill="#D0D0D0"/>
    <rect x="76" y="392" width="210" height="8" rx="4" fill="#EBEBEB"/>
    <rect x="76" y="392" width="105" height="8" rx="4" fill="#E8A87C"/>
    <rect x="308" y="368" width="48" height="18" rx="6" fill="#F0F0F0"/>

    <!-- Card 3: Cereales (exceeded) -->
    <rect x="22" y="424" width="346" height="76" rx="12" fill="white"/>
    <circle cx="52" cy="462" r="14" fill="#D4A853"/>
    <rect x="76" y="450" width="84" height="13" rx="4" fill="#D0D0D0"/>
    <rect x="76" y="476" width="210" height="8" rx="4" fill="#D4A853"/>
    <rect x="76" y="476" width="52"  height="8" rx="4" fill="#C97878"/>
    <rect x="308" y="452" width="48" height="18" rx="6" fill="#FDECEA"/>

    <!-- Card 4: Lácteos -->
    <rect x="22" y="508" width="346" height="76" rx="12" fill="white"/>
    <circle cx="52" cy="546" r="14" fill="#7B9EC7"/>
    <rect x="76" y="534" width="68" height="13" rx="4" fill="#D0D0D0"/>
    <rect x="76" y="560" width="210" height="8" rx="4" fill="#EBEBEB"/>
    <rect x="76" y="560" width="168" height="8" rx="4" fill="#7B9EC7"/>
    <rect x="308" y="536" width="48" height="18" rx="6" fill="#F0F0F0"/>

    <!-- Card 5: Grasas -->
    <rect x="22" y="592" width="346" height="76" rx="12" fill="white"/>
    <circle cx="52" cy="630" r="14" fill="#B5A97E"/>
    <rect x="76" y="618" width="68" height="13" rx="4" fill="#D0D0D0"/>
    <rect x="76" y="644" width="210" height="8" rx="4" fill="#EBEBEB"/>
    <rect x="76" y="644" width="84"  height="8" rx="4" fill="#B5A97E"/>
    <rect x="308" y="620" width="48" height="18" rx="6" fill="#F0F0F0"/>

    <!-- Placeholder label -->
    <rect x="100" y="736" width="190" height="14" rx="4" fill="#DCDCDC"/>
    <rect x="130" y="758" width="130" height="10" rx="4" fill="#E8E8E8"/>
  </g>
</svg>
