<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <clipPath id="screen">
      <rect x="6" y="6" width="378" height="832" rx="38"/>
    </clipPath>
  </defs>

  <rect width="390" height="844" rx="44" fill="#1C1C1E"/>

  <g clip-path="url(#screen)">
    <!-- Home screen background -->
    <rect x="6" y="6" width="378" height="832" fill="#1A2535"/>

    <!-- Status bar (transparent style on home screen) -->
    <rect x="22"  y="20" width="28" height="10" rx="3" fill="white" opacity=".5"/>
    <rect x="330" y="20" width="44" height="10" rx="3" fill="white" opacity=".5"/>
    <circle cx="195" cy="26" r="5" fill="#1C1C1E"/>

    <!-- App grid dots (wallpaper suggestion) -->
    <circle cx="60"  cy="120" r="3" fill="white" opacity=".08"/>
    <circle cx="130" cy="120" r="3" fill="white" opacity=".08"/>
    <circle cx="200" cy="120" r="3" fill="white" opacity=".08"/>
    <circle cx="270" cy="120" r="3" fill="white" opacity=".08"/>
    <circle cx="340" cy="120" r="3" fill="white" opacity=".08"/>

    <!-- Widget card -->
    <rect x="16" y="148" width="358" height="188" rx="20" fill="white" opacity=".96"/>

    <!-- Widget: Ring (left side) -->
    <!-- Ring track -->
    <circle cx="96" cy="242" r="52" fill="none" stroke="#EBEBEB" stroke-width="16"/>
    <!-- Ring progress (82%) -->
    <circle cx="96" cy="242" r="52" fill="none" stroke="#6B8F71" stroke-width="16"
      stroke-dasharray="326.7" stroke-dashoffset="58.8"
      stroke-linecap="round" transform="rotate(-90 96 242)"/>
    <!-- % text block -->
    <rect x="72" y="233" width="48" height="20" rx="5" fill="#E8F4EA"/>

    <!-- Widget: Group bars (right side) -->
    <!-- Bar 1 -->
    <rect x="172" y="174" width="172" height="10" rx="5" fill="#EBEBEB"/>
    <rect x="172" y="174" width="138" height="10" rx="5" fill="#81A882"/>
    <!-- Bar 2 -->
    <rect x="172" y="202" width="172" height="10" rx="5" fill="#EBEBEB"/>
    <rect x="172" y="202" width="86"  height="10" rx="5" fill="#E8A87C"/>
    <!-- Bar 3 -->
    <rect x="172" y="230" width="172" height="10" rx="5" fill="#EBEBEB"/>
    <rect x="172" y="230" width="172" height="10" rx="5" fill="#D4A853"/>
    <!-- Bar 4 -->
    <rect x="172" y="258" width="172" height="10" rx="5" fill="#EBEBEB"/>
    <rect x="172" y="258" width="120" height="10" rx="5" fill="#7B9EC7"/>
    <!-- Bar labels -->
    <rect x="172" y="160" width="52" height="8" rx="3" fill="#D0D0D0"/>
    <rect x="172" y="188" width="44" height="8" rx="3" fill="#D0D0D0"/>
    <rect x="172" y="216" width="60" height="8" rx="3" fill="#D0D0D0"/>
    <rect x="172" y="244" width="50" height="8" rx="3" fill="#D0D0D0"/>

    <!-- Widget: Weekly dots row -->
    <rect x="24" y="292" width="350" height="1" fill="#F0F0F0"/>
    <!-- 7 day dots (L M X J V S D) -->
    <circle cx="50"  cy="318" r="12" fill="#6B8F71"/>
    <circle cx="100" cy="318" r="12" fill="#6B8F71"/>
    <circle cx="150" cy="318" r="12" fill="#A4C3A2"/>
    <circle cx="200" cy="318" r="12" fill="#6B8F71"/>
    <circle cx="250" cy="318" r="12" fill="#6B8F71"/>
    <circle cx="300" cy="318" r="12" fill="#A4C3A2"/>
    <circle cx="350" cy="318" r="12" fill="#EBEBEB"/>
    <!-- Day labels -->
    <rect x="38"  cy="334" width="24" height="8" rx="2" fill="#D0D0D0"/>
    <rect x="88"  cy="334" width="24" height="8" rx="2" fill="#D0D0D0"/>
    <rect x="138" cy="334" width="24" height="8" rx="2" fill="#D0D0D0"/>
    <rect x="188" cy="334" width="24" height="8" rx="2" fill="#D0D0D0"/>
    <rect x="238" cy="334" width="24" height="8" rx="2" fill="#D0D0D0"/>
    <rect x="288" cy="334" width="24" height="8" rx="2" fill="#D0D0D0"/>
    <rect x="338" cy="334" width="24" height="8" rx="2" fill="#D0D0D0"/>

    <!-- Home screen app icons (below widget) -->
    <rect x="28"  y="380" width="60" height="60" rx="16" fill="white" opacity=".08"/>
    <rect x="108" y="380" width="60" height="60" rx="16" fill="white" opacity=".08"/>
    <rect x="188" y="380" width="60" height="60" rx="16" fill="white" opacity=".08"/>
    <rect x="268" y="380" width="60" height="60" rx="16" fill="white" opacity=".08"/>
    <rect x="28"  y="460" width="60" height="60" rx="16" fill="white" opacity=".08"/>
    <rect x="108" y="460" width="60" height="60" rx="16" fill="white" opacity=".08"/>
    <rect x="188" y="460" width="60" height="60" rx="16" fill="white" opacity=".08"/>
    <rect x="268" y="460" width="60" height="60" rx="16" fill="white" opacity=".08"/>

    <!-- Dock -->
    <rect x="16" y="740" width="358" height="80" rx="24" fill="white" opacity=".10"/>
    <rect x="48"  y="756" width="52" height="52" rx="14" fill="white" opacity=".15"/>
    <rect x="128" y="756" width="52" height="52" rx="14" fill="white" opacity=".15"/>
    <rect x="208" y="756" width="52" height="52" rx="14" fill="#6B8F71"/>
    <rect x="288" y="756" width="52" height="52" rx="14" fill="white" opacity=".15"/>

    <!-- Bottom indicator -->
    <rect x="160" y="828" width="70" height="4" rx="2" fill="white" opacity=".3"/>
  </g>
</svg>
