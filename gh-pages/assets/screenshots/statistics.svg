    <!-- Axis -->
    <rect x="42" y="290" width="1" height="180" fill="#EBEBEB"/>
    <rect x="42" y="470" width="306" height="1" fill="#EBEBEB"/>
    <!-- Bars (7 days) -->
    <rect x="56"  y="390" width="34" height="80" rx="6" fill="#A4C3A2"/>
    <rect x="98"  y="360" width="34" height="110" rx="6" fill="#A4C3A2"/>
    <rect x="140" y="320" width="34" height="150" rx="6" fill="#6B8F71"/>
    <rect x="182" y="370" width="34" height="100" rx="6" fill="#A4C3A2"/>
    <rect x="224" y="300" width="34" height="170" rx="6" fill="#6B8F71"/>
    <rect x="266" y="350" width="34" height="120" rx="6" fill="#A4C3A2"/>
    <rect x="308" y="410" width="34" height="60"  rx="6" fill="#A4C3A2"/>
    <!-- Day labels -->
    <rect x="58"  y="478" width="30" height="8" rx="2" fill="#E0E0E0"/>
    <rect x="100" y="478" width="30" height="8" rx="2" fill="#E0E0E0"/>
    <rect x="142" y="478" width="30" height="8" rx="2" fill="#6B8F71"/>
    <rect x="184" y="478" width="30" height="8" rx="2" fill="#E0E0E0"/>
    <rect x="226" y="478" width="30" height="8" rx="2" fill="#6B8F71"/>
    <rect x="268" y="478" width="30" height="8" rx="2" fill="#E0E0E0"/>
    <rect x="310" y="478" width="30" height="8" rx="2" fill="#E0E0E0"/>

    <!-- Streak card -->
    <rect x="22" y="514" width="346" height="76" rx="14" fill="white"/>
    <rect x="42" y="530" width="56" height="16" rx="4" fill="#D0D0D0"/>
    <rect x="42" y="554" width="36" height="24" rx="6" fill="#E8F4EA"/>
    <rect x="220" y="530" width="56" height="16" rx="4" fill="#D0D0D0"/>
    <rect x="220" y="554" width="36" height="24" rx="6" fill="#F0F0F0"/>

    <!-- Group breakdown -->
    <rect x="22" y="602" width="346" height="12" rx="4" fill="#1A2E1C" opacity=".5"/>
    <rect x="22" y="626" width="346" height="60" rx="12" fill="white"/>
    <circle cx="50" cy="656" r="12" fill="#81A882"/>
    <rect x="72" y="645" width="90"  height="12" rx="4" fill="#D0D0D0"/>
    <rect x="72" y="663" width="140" height="8"  rx="3" fill="#EBEBEB"/>
    <rect x="72" y="663" width="112" height="8"  rx="3" fill="#81A882"/>
    <rect x="310" y="648" width="42" height="16" rx="4" fill="#F0F0F0"/>

    <rect x="100" y="736" width="190" height="14" rx="4" fill="#DCDCDC"/>
    <rect x="130" y="758" width="130" height="10" rx="4" fill="#E8E8E8"/>
