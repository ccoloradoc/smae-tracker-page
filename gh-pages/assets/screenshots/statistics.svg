<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <clipPath id="screen">
      <rect x="6" y="6" width="378" height="832" rx="38"/>
    </clipPath>
  </defs>

  <rect width="390" height="844" rx="44" fill="#1C1C1E"/>

  <g clip-path="url(#screen)">
    <rect x="6" y="6" width="378" height="832" fill="#F6F6F2"/>

    <!-- Status bar -->
    <rect x="6" y="6" width="378" height="52" fill="#6B8F71"/>
    <rect x="22"  y="20" width="28" height="10" rx="3" fill="white" opacity=".6"/>
    <rect x="330" y="20" width="44" height="10" rx="3" fill="white" opacity=".6"/>
    <circle cx="195" cy="26" r="5" fill="#1C1C1E"/>

    <!-- App bar -->
    <rect x="6" y="58" width="378" height="56" fill="white"/>
    <rect x="22" y="76" width="110" height="16" rx="4" fill="#1A2E1C"/>

    <!-- Period selector tabs -->
    <rect x="22" y="126" width="346" height="44" rx="12" fill="white"/>
    <rect x="28" y="130" width="163" height="36" rx="10" fill="#6B8F71"/>
    <rect x="197" y="130" width="165" height="36" rx="10" fill="transparent"/>
    <rect x="60"  y="141" width="80" height="14" rx="4" fill="white"/>
    <rect x="228" y="141" width="60" height="14" rx="4" fill="#D0D0D0"/>

    <!-- Average summary card -->
    <rect x="22" y="182" width="346" height="88" rx="14" fill="white"/>
