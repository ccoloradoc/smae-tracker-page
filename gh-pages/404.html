      letter-spacing: -4px;
    }
    .error-title {
      font-size: 1.5rem; font-weight: 700;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 1rem; color: var(--text-muted);

<body>

  <nav class="nav">
